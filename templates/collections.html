{% extends 'base.html' %}
{% load static %}

{% block title %}Curated Collections | PRORENT{% endblock %}

{% block content %}
<section style="padding: 6rem 0;">
    <div class="section-inner">
      <div class="section-header">
        <span class="section-eyebrow">Shop by Occasion</span>
        <h2>Curated Collections</h2>
        <p>Every ensemble tells a story. Find yours.</p>
      </div>
      
      <div class="categories-grid">
        <a href="/category/party-wear/" style="text-decoration:none; color:inherit;">
          <div class="cat-card">
            <div class="cat-img">
              <img src="{% static 'images/party2.jpg' %}" alt="Party Wear">
            </div>
            <div class="cat-overlay"></div>
            <div class="cat-info">
              <h3>Party Wear</h3>
            </div>
          </div>
        </a>

        <a href="/category/wedding-wear/" style="text-decoration:none; color:inherit;">
          <div class="cat-card">
            <div class="cat-img">
              <img src="{% static 'images/wedding2.jpg' %}" alt="Wedding Wear">
            </div>
            <div class="cat-overlay"></div>
            <div class="cat-info">
              <h3>Wedding Wear</h3>
            </div>
          </div>
        </a>
      </div>
    </div>
</section>
{% endblock %}
