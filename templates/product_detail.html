{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>{{ product.title }}</title>

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<style>

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:linear-gradient(to right,#f8f8f8,#f2f2f2);
}

/* MAIN LAYOUT */

.product-page{
    max-width:1000px;
    margin:20px auto;
    display:flex;
    gap:70px;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 10px 35px rgba(0,0,0,0.08);
}

/* LEFT IMAGE */

.product-left{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

.product-left img{
    width:90%;
    border-radius:10px;
    transition:0.3s;
}

.product-left img:hover{
    transform:scale(1.05);
}

/* RIGHT SIDE */

.product-right{
    flex:1;
}

.product-title{
    font-size:42px;
    font-weight:600;
    margin-bottom:5px;
}

.product-price{
    font-size:35px;
    font-weight:bold;
    margin:12px 0;
}

.deposit{
    color:#888;
    margin-bottom:30px;
}

/* SIZE BUTTONS */

.size-box{
    margin-bottom:25px;
}

.size-btn{
    padding:10px 16px;
    border:1px solid #ddd;
    background:white;
    cursor:pointer;
    margin-right:10px;
    border-radius:6px;
    transition:0.2s;
}

.size-btn:hover{
    border-color:black;
}

/* DATE INPUT */

.option-box{
    margin-bottom:20px;
}

.option-box label{
    display:block;
    margin-bottom:6px;
    color:#555;
}

input{
    padding:12px;
    width:250px;
    border:1px solid #ddd;
    border-radius:6px;
}

/* RENT BUTTON */

.rent-btn{
    margin-top:25px;
    padding:15px;
    width:260px;
    background:black;
    color:white;
    border:none;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}

.rent-btn:hover{
    background:#333;
}

/* DESCRIPTION */

.description{
    margin-top:35px;
}

.description h3{
    margin-bottom:10px;
}

.description p{
    color:#555;
    line-height:1.6;
}

</style>

</head>
<body>

<div class="product-page">

<div class="product-left">
<img src="{{ product.image.url }}">
</div>

<div class="product-right">

<h1 class="product-title">{{ product.title }}</h1>

<div class="product-price">
₹{{ product.price_per_day }} / day
</div>

<div class="deposit">
Refundable Deposit ₹{{ product.security_deposit }}
</div>

<!-- SIZE -->

<div class="size-box">
<label><b>Size</b></label><br><br>

<button class="size-btn">{{ product.size }}</button>

</div>

<!-- START DATE -->

<div class="option-box">
<label>Start Date</label>
<input type="date">
</div>

<!-- RETURN DATE -->

<div class="option-box">
<label>Return Date</label>
<input type="date">
</div>

<button class="rent-btn">
Rent Now
</button>

<div class="description">

<h3>Description</h3>

<p>{{ product.description }}</p>

</div>

</div>

</div>

</body>
</html>
