{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Browse</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div>
  <div class="shop-header">
    <h1>Browse Collection</h1>
    <div class="breadcrumb">Home <span>/</span> All Outfits</div>
  </div>
  <div class="shop-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-block">
        <h4>Category</h4>
        <div class="filter-option"><input type="checkbox" id="c1" onchange="applyFilters()"><label for="c1">Designer (420)</label></div>
        <div class="filter-option"><input type="checkbox" id="c2" onchange="applyFilters()"><label for="c2">Party Wear (680)</label></div>
        <div class="filter-option"><input type="checkbox" id="c3" onchange="applyFilters()"><label for="c3">Wedding (1,200)</label></div>
        <div class="filter-option"><input type="checkbox" id="c4" onchange="applyFilters()"><label for="c4">Ethnic (950)</label></div>
      </div>
      <div class="sidebar-block">
        <h4>Price / Day (₹)</h4>
        <div class="price-range">
          <input type="number" id="minPrice" placeholder="Min" value="0" onchange="applyFilters()">
          <span style="color:var(--muted)">—</span>
          <input type="number" id="maxPrice" placeholder="Max" value="10000" onchange="applyFilters()">
        </div>
      </div>
      <div class="sidebar-block">
        <h4>Size</h4>
        <div class="size-grid">
          <button class="size-btn" onclick="toggleSizeFilter(this)">XS</button>
          <button class="size-btn" onclick="toggleSizeFilter(this)">S</button>
          <button class="size-btn" onclick="toggleSizeFilter(this)">M</button>
          <button class="size-btn" onclick="toggleSizeFilter(this)">L</button>
          <button class="size-btn" onclick="toggleSizeFilter(this)">XL</button>
          <button class="size-btn" onclick="toggleSizeFilter(this)">XXL</button>
        </div>
      </div>
      <div class="sidebar-block">
        <button class="btn-outline" style="width:100%" onclick="clearFilters()">Clear Filters</button>
      </div>
    </aside>
    <!-- Products -->
    <div class="shop-products">
      <div class="shop-toolbar">
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input type="text" id="shopSearch" placeholder="Search outfits..." oninput="applyFilters()">
        </div>
        <span class="results-count" id="resultCount">Loading...</span>
        <select class="sort-select" id="sortSelect" onchange="applyFilters()">
          <option value="default">Sort By</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="rating">Top Rated</option>
        </select>
      </div>
      <div class="shop-grid" id="shopGrid"></div>
    </div>
  </div>
  <script src="{% static 'js/script.js' %}"></script>
</div>

</body>
</html>
